databases:
  - name: lifeflow-db
    plan: free
    databaseName: lifeflow
    user: lifeflow_user

services:
  - type: web
    name: lifeflow-backend
    plan: free
    runtime: python
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DB_NAME
        fromDatabase:
          name: lifeflow-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lifeflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lifeflow-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: lifeflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lifeflow-db
          property: port
